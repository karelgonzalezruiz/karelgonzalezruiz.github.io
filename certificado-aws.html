<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CertificadoAWS-Karel-Gonzalez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        --ink: #1b1d1c;
        --muted: #5b6470;
        --accent: #0d9488;
        --line: #d7dcd6;
        --font-body: "Inter", system-ui, sans-serif;
        --font-head: "Space Grotesk", var(--font-body);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #eef0ec;
        color: var(--ink);
        font-family: var(--font-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .toolbar {
        display: flex;
        justify-content: center;
        gap: 0.6rem;
        padding: 1rem;
      }

      .toolbar a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0.6rem 1.3rem;
        border-radius: 999px;
        font-family: var(--font-head);
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      .toolbar a {
        border: 1px solid #c9cdc7;
        background: #fff;
        color: var(--ink);
      }

      .toolbar .toolbar-primary {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .viewer {
        width: min(calc(100% - 2rem), 1120px);
        aspect-ratio: 297 / 210;
        margin: 0 auto 2rem;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: 0 18px 50px rgba(20, 30, 28, 0.12);
      }

      .viewer object {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .fallback {
        margin: 0;
        padding: 1.5rem;
        color: var(--muted);
      }

      .fallback a {
        color: var(--accent);
        font-weight: 600;
      }

      @media (max-width: 700px) {
        .toolbar {
          flex-wrap: wrap;
        }

        .viewer {
          width: calc(100% - 1rem);
        }
      }

      @media print {
        body { background: #fff; }
        .toolbar { display: none; }
        .viewer {
          width: auto;
          height: auto;
          aspect-ratio: 297 / 210;
          margin: 0;
          border: 0;
          box-shadow: none;
        }
        @page { size: A4 landscape; margin: 0; }
      }
    </style>
  </head>
  <body>
    <div class="toolbar" role="navigation" aria-label="Acciones del certificado">
      <a href="index.html#certificaciones">&larr; Volver al portafolio</a>
      <a
        class="toolbar-primary"
        href="docs/CertificadoAWS-Karel-Gonzalez.pdf"
        download="CertificadoAWS-Karel-Gonzalez.pdf"
      >Descargar / Imprimir PDF</a>
    </div>

    <main class="viewer" aria-label="Certificado AWS Academy Data Engineering">
      <object
        data="docs/CertificadoAWS-Karel-Gonzalez.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit"
        title="Certificado AWS Academy Data Engineering"
        type="application/pdf"
      >
        <p class="fallback">
          Tu navegador no puede mostrar la vista previa del certificado.
          <a href="docs/CertificadoAWS-Karel-Gonzalez.pdf">Abrir PDF</a>
        </p>
      </object>
    </main>
  </body>
</html>
